models:
  Lab:
    nama_labor: string:255
    deskripsi: text nullable
    laboran_id: foreignId constrained on users
    relationships:
      hasMany: Peminjaman
      hasOne: Kalab
      belongsTo: User

  Kalab:
    nip: string nullable
    nama: string
    nohp: string
    prodi: string
    lab_id: string
    user_id: foreignId
    relationships:
      belongsTo: User,Lab

  Mahasiswa:
    nim: string
    nama: string nullable
    nohp: string nullable
    semester: string nullable
    prodi: string nullable
    user_id: foreignId nullable
    relationships:
      belongsTo: User
      hasMany: Peminjaman

  Peminjaman:
    lab_id: foreignId constrained onDelete:cascade
    mahasiswa_id: foreignId constrained on mahasiswas
    tanggal_mulai: datetime
    tanggal_selesai: datetime
    keperluan: string:500
    surat_peminjaman: string:255   # path file di storage
    status: enum:pending,confirmed_laboran,pending_kepala,approved,rejected default:pending
    catatan_laboran: text nullable
    catatan_kepala: text nullable
    relationships:
      belongsTo: Lab,Mahasiswa

  JadwalKosong:
    lab_id: foreignId
    hari: enum:senin,selasa,rabu,kamis,jumat,sabtu,minggu nullable
    jam_mulai: time nullable
    jam_selesai: time nullable
    keterangan: string nullable
    aktif: boolean
    relationships:
      belongsTo: Lab
  
  JadwalPengecualian:
    jadwal_kosong_id: foreignId
    lab_id: foreignId
    tanggal: date
    jam_mulai: time nullable
    jam_selesai: time nullable
    tipe: enum:tambah,hapus
    alasan: string
    relationships:
      belongsTo: Lab

    
   